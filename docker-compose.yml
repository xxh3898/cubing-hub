version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cubing_hub_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "0122"
      MYSQL_DATABASE: cubing_hub
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: cubing_hub_redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
