spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///cubing_hub
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: false

jwt:
  secret: testSecretKeyForTestingPurposes12345678901234
  expiration: 10000
  refresh-expiration: 60000

cors:
  allowed-origins: http://localhost:5173

auth:
  refresh-cookie:
    secure: true
  email-verification:
    code-expiration-ms: 600000
    resend-cooldown-ms: 60000
    verified-expiration-ms: 1800000
    subject: Cubing Hub 이메일 인증

smtp:
  host:
  port: 587
  username:
  password:
  auth: true
  starttls-enable: true
  from-address:
  connection-timeout-ms: 5000
  timeout-ms: 3000
  write-timeout-ms: 5000

ranking:
  redis:
    rebuild-mode: disabled

feedback:
  discord:
    webhook-url:

post:
  images:
    bucket:
    region:
    key-prefix: community/posts
    public-base-url:
    max-file-count: 5
    max-file-size-bytes: 10485760
    max-total-size-bytes: 31457280
