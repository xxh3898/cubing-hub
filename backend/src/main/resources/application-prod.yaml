spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cubing_hub}?useSSL=false&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000} # 30 mins
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://cubing-hub.com,https://www.cubing-hub.com}

auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}

ranking:
  redis:
    rebuild-on-startup: ${RANKING_REDIS_REBUILD_ON_STARTUP:false}

monitoring:
  prometheus:
    permit-all: ${MONITORING_PROMETHEUS_PERMIT_ALL:false}

feedback:
  discord:
    webhook-url: ${FEEDBACK_DISCORD_WEBHOOK_URL:}
