spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cubing_hub}?sslMode=REQUIRED&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: existing schema baseline

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 35MB

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:1800000} # 30 mins
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://cubing-hub.com,https://www.cubing-hub.com}

auth:
  refresh-cookie:
    secure: ${AUTH_REFRESH_COOKIE_SECURE:true}
  email-verification:
    code-expiration-ms: ${AUTH_EMAIL_VERIFICATION_CODE_EXPIRATION_MS:600000}
    resend-cooldown-ms: ${AUTH_EMAIL_VERIFICATION_RESEND_COOLDOWN_MS:60000}
    verified-expiration-ms: ${AUTH_EMAIL_VERIFICATION_VERIFIED_EXPIRATION_MS:1800000}
    subject: ${AUTH_EMAIL_VERIFICATION_SUBJECT:Cubing Hub 이메일 인증}

smtp:
  host: ${SMTP_HOST:}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USERNAME:}
  password: ${SMTP_PASSWORD:}
  auth: ${SMTP_AUTH:true}
  starttls-enable: ${SMTP_STARTTLS_ENABLE:true}
  from-address: ${SMTP_FROM_ADDRESS:}
  connection-timeout-ms: 5000
  timeout-ms: 3000
  write-timeout-ms: 5000

ranking:
  redis:
    rebuild-mode: ${RANKING_REDIS_REBUILD_MODE:disabled}

monitoring:
  prometheus:
    permit-all: ${MONITORING_PROMETHEUS_PERMIT_ALL:false}

feedback:
  discord:
    webhook-url: ${FEEDBACK_DISCORD_WEBHOOK_URL:}

post:
  images:
    bucket: ${POST_IMAGES_BUCKET:}
    region: ${POST_IMAGES_REGION:}
    key-prefix: ${POST_IMAGES_KEY_PREFIX:community/posts}
    public-base-url: ${POST_IMAGES_PUBLIC_BASE_URL:}
    max-file-count: 5
    max-file-size-bytes: 10485760
    max-total-size-bytes: 31457280
