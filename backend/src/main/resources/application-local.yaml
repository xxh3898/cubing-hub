spring:
  config:
    import:
      - optional:file:../.env[.properties]

  datasource:
    url: jdbc:mysql://localhost:3306/cubing_hub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      file: ../docker-compose.yml
      lifecycle-management: start-and-stop
      working-directory: ..
      readiness:
        tcp:
          readiness-check-http-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: ${LOCAL_JWT_SECRET}
  expiration: 86400000       # Access Token: 1일
  refresh-expiration: 604800000  # Refresh Token: 7일

cors:
  allowed-origins: http://localhost:5173

auth:
  refresh-cookie:
    secure: false
  email-verification:
    code-expiration-ms: 600000
    resend-cooldown-ms: 60000
    verified-expiration-ms: 1800000
    subject: Cubing Hub 이메일 인증

smtp:
  host: ${SMTP_HOST:}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USERNAME:}
  password: ${SMTP_PASSWORD:}
  auth: ${SMTP_AUTH:true}
  starttls-enable: ${SMTP_STARTTLS_ENABLE:true}
  from-address: ${SMTP_FROM_ADDRESS:}
  connection-timeout-ms: 5000
  timeout-ms: 3000
  write-timeout-ms: 5000

ranking:
  redis:
    rebuild-on-startup: true

monitoring:
  prometheus:
    permit-all: true

feedback:
  discord:
    webhook-url: ${LOCAL_FEEDBACK_DISCORD_WEBHOOK_URL:}
