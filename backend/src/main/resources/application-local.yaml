spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cubing_hub?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: "0122"
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      file: ../docker-compose.yml
      lifecycle-management: start-and-stop
      working-directory: ..
      readiness:
        tcp:
          readiness-check-http-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}

jwt:
  secret: aW52YWxpZFNlY3JldEtleUZvckxvY2FsRGV2ZWxvcG1lbnQxMjM0NTY3ODkwMTI=
  expiration: 86400000 # 1 day

cors:
  allowed-origins: http://localhost:5173
