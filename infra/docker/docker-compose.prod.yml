services:
  app:
    image: ${BACKEND_IMAGE}:${BACKEND_IMAGE_TAG:-latest}
    container_name: cubing_hub_app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cubing_hub}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1800000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://cubing-hub.com,https://www.cubing-hub.com}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      AUTH_EMAIL_VERIFICATION_CODE_EXPIRATION_MS: ${AUTH_EMAIL_VERIFICATION_CODE_EXPIRATION_MS:-600000}
      AUTH_EMAIL_VERIFICATION_RESEND_COOLDOWN_MS: ${AUTH_EMAIL_VERIFICATION_RESEND_COOLDOWN_MS:-60000}
      AUTH_EMAIL_VERIFICATION_VERIFIED_EXPIRATION_MS: ${AUTH_EMAIL_VERIFICATION_VERIFIED_EXPIRATION_MS:-1800000}
      AUTH_EMAIL_VERIFICATION_SUBJECT: ${AUTH_EMAIL_VERIFICATION_SUBJECT:-Cubing Hub 이메일 인증}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      FEEDBACK_DISCORD_WEBHOOK_URL: ${FEEDBACK_DISCORD_WEBHOOK_URL:-}
      RANKING_REDIS_REBUILD_ON_STARTUP: ${RANKING_REDIS_REBUILD_ON_STARTUP:-false}
      POST_IMAGES_BUCKET: ${POST_IMAGES_BUCKET:-}
      POST_IMAGES_REGION: ${POST_IMAGES_REGION:-}
      POST_IMAGES_KEY_PREFIX: ${POST_IMAGES_KEY_PREFIX:-community/posts}
      POST_IMAGES_PUBLIC_BASE_URL: ${POST_IMAGES_PUBLIC_BASE_URL:-}
    depends_on:
      redis:
        condition: service_started
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: cubing_hub_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: cubing_hub_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${CERTBOT_WEBROOT:-/var/www/certbot}:/var/www/certbot:ro
    networks:
      - backend

volumes:
  redis_data:

networks:
  backend:
