services:
  mysql-admin-proxy:
    image: alpine/socat:1.8.0.0
    container_name: cubing_hub_mysql_admin_proxy
    profiles: ["admin"]
    command: ["TCP-LISTEN:3307,fork,reuseaddr", "TCP:mysql:3306"]
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:3307:3307"
    networks:
      - frontend
      - backend

