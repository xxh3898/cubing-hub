services:
  web:
    image: ${DOCKERHUB_NAMESPACE:-xxh3898}/cubing-hub-web:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: cubing_hub_web
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - frontend

  app:
    image: ${DOCKERHUB_NAMESPACE:-xxh3898}/cubing-hub-api:${IMAGE_TAG:?IMAGE_TAG is required}
    container_name: cubing_hub_app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${DB_NAME:-cubing_hub}?sslMode=DISABLED&serverTimezone=Asia/Seoul
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1800000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://cubing-hub.com,https://www.cubing-hub.com}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      AUTH_REFRESH_COOKIE_SECURE: ${AUTH_REFRESH_COOKIE_SECURE:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
      FEEDBACK_DISCORD_WEBHOOK_URL: ${FEEDBACK_DISCORD_WEBHOOK_URL:-}
      RANKING_REDIS_REBUILD_MODE: ${RANKING_REDIS_REBUILD_MODE:-disabled}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,prometheus}
      MONITORING_PROMETHEUS_PERMIT_ALL: ${MONITORING_PROMETHEUS_PERMIT_ALL:-false}
      POST_IMAGES_STORAGE_TYPE: local
      POST_IMAGES_LOCAL_ROOT_PATH: /data/post-images
      POST_IMAGES_KEY_PREFIX: ${POST_IMAGES_KEY_PREFIX:-community/posts}
      POST_IMAGES_PUBLIC_BASE_URL: ${POST_IMAGES_PUBLIC_BASE_URL:-https://api.cubing-hub.com/uploads}
    volumes:
      - ${POST_IMAGES_HOST_DIR:?POST_IMAGES_HOST_DIR is required}:/data/post-images
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - frontend
      - backend

  mysql:
    image: mysql:8.0
    container_name: cubing_hub_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cubing_hub}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7.2-alpine
    container_name: cubing_hub_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - backend

  nginx:
    image: nginx:1.27.5-alpine
    container_name: cubing_hub_nginx
    restart: unless-stopped
    depends_on:
      - web
      - app
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./nginx/home-server.conf:/etc/nginx/conf.d/default.conf:ro
      - ${POST_IMAGES_HOST_DIR:?POST_IMAGES_HOST_DIR is required}:/data/post-images:ro
    networks:
      - frontend

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cubing_hub_prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - frontend

  grafana:
    image: grafana/grafana:11.2.0
    container_name: cubing_hub_grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - frontend

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  frontend:
  backend:
    internal: true
