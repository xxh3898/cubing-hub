name: CI — 통합 테스트

on:
  push:
    branches: [ "main", "test/**" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  backend-test:
    name: Testcontainers 통합 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle', '**/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 테스트 실행과 JaCoCo 리포트 생성
        working-directory: ./backend
        run: ./gradlew test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 문서 빌드 검증 (Rest Docs)
        working-directory: ./backend
        run: ./gradlew build -x test --no-daemon

      - name: REST Docs HTML 업로드
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: restdocs-site
          path: backend/build/docs/asciidoc/

      - name: 테스트 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/

      - name: JaCoCo 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/build/reports/jacoco/test/

  frontend-test:
    name: Frontend 검증
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: ./frontend
        run: npm ci

      - name: 린트 실행
        working-directory: ./frontend
        run: npm run lint

      - name: 테스트 실행
        working-directory: ./frontend
        run: npm test

      - name: 빌드 검증
        working-directory: ./frontend
        run: npm run build
