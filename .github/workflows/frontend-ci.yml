name: Frontend CI

on:
  push:
    branches: ["main", "test/**"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    name: Frontend 검증
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: ./frontend
        run: npm ci

      - name: 실패 분석 디렉터리 준비
        working-directory: ./frontend
        run: mkdir -p .ci-reports

      - name: 린트 실행
        id: lint
        working-directory: ./frontend
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee .ci-reports/eslint.txt

      - name: 린트 JSON 리포트 생성 (실패 시)
        if: failure() && steps.lint.outcome == 'failure'
        working-directory: ./frontend
        run: npx eslint . --format json --output-file .ci-reports/eslint.json || true

      - name: 테스트 실행
        working-directory: ./frontend
        run: npm test -- --run --reporter=default --reporter=junit --outputFile.junit=.ci-reports/vitest.xml

      - name: 빌드 검증
        working-directory: ./frontend
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee .ci-reports/build.log

      - name: 프런트 실패 산출물 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-failure-reports
          path: frontend/.ci-reports/
          if-no-files-found: ignore
